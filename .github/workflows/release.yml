name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # release-please reads conventional commits since the last release,
  # determines the next semver, updates CHANGELOG.md, and opens a PR.
  # When that PR is merged, it creates the GitHub Release + tag.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

